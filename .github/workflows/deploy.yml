name: CI/CD — ShopAPI

# Déclenché sur chaque push sur la branche main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # sbk6/projet_20_flask_fast_api_vps

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1 : Tests et lint
  # ══════════════════════════════════════════════════════════════════════════
  test:
    name: Tests & Couverture
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer les tests avec couverture
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: test-secret-key-for-ci
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REFRESH_TOKEN_EXPIRE_DAYS: 7
          ENVIRONMENT: test
        run: |
          python -m pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2 : Build et push de l'image Docker
  # (seulement sur push main, pas sur PR)
  # ══════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test   # Ne démarre que si les tests passent
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write   # Nécessaire pour pousser sur ghcr.io

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Se connecter au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées Docker (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Construire et pousser l'image Docker
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 3 : Déploiement SSH sur le VPS
  # ══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Déploiement VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Récupérer le code (pour les fichiers de config)
        uses: actions/checkout@v4

      - name: Déployer sur le VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "=== Déploiement ShopAPI ==="
            cd /opt/shopapi

            # Sauvegarder la version actuelle pour rollback
            CURRENT_IMAGE=$(docker inspect --format='{{.Config.Image}}' shopapi_api_1 2>/dev/null || echo "none")
            echo "Image actuelle : $CURRENT_IMAGE"

            # Se connecter au registry GitHub
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Télécharger la nouvelle image
            docker pull ghcr.io/${{ github.repository }}:latest

            # Redémarrer les services avec la nouvelle image
            docker compose -f deploy/docker-compose.prod.yml up -d --no-deps api

            # Attendre que l'API réponde (healthcheck)
            echo "=== Vérification du healthcheck ==="
            RETRIES=0
            MAX_RETRIES=12
            until curl -sf http://127.0.0.1:8000/health > /dev/null; do
              RETRIES=$((RETRIES+1))
              if [ $RETRIES -ge $MAX_RETRIES ]; then
                echo "ERREUR: Healthcheck échoué après 60 secondes. Rollback..."
                # Rollback : remettre l'ancienne image
                if [ "$CURRENT_IMAGE" != "none" ]; then
                  docker compose -f deploy/docker-compose.prod.yml up -d --no-deps api
                fi
                exit 1
              fi
              echo "En attente... ($RETRIES/$MAX_RETRIES)"
              sleep 5
            done

            echo "=== Déploiement réussi ! ==="
            docker compose -f deploy/docker-compose.prod.yml ps

            # Nettoyer les anciennes images (garder les 3 dernières)
            docker image prune -f

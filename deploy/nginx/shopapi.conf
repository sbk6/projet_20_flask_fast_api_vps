# Configuration Nginx pour ShopAPI
# À copier dans /etc/nginx/sites-available/shopapi
# puis : sudo ln -s /etc/nginx/sites-available/shopapi /etc/nginx/sites-enabled/

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name VOTRE_DOMAINE.duckdns.org;

    # Certbot utilisera ce chemin pour valider le domaine
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Serveur HTTPS principal
server {
    listen 443 ssl;
    server_name VOTRE_DOMAINE.duckdns.org;

    # Certificats Let's Encrypt (générés par Certbot)
    ssl_certificate     /etc/letsencrypt/live/VOTRE_DOMAINE.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/VOTRE_DOMAINE.duckdns.org/privkey.pem;

    # Paramètres SSL recommandés
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # En-têtes de sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Compression gzip
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 1024;

    # Taille max des requêtes (upload fichiers)
    client_max_body_size 10M;

    # Proxy vers l'API FastAPI (port 8000)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Logs
    access_log /var/log/nginx/shopapi_access.log;
    error_log  /var/log/nginx/shopapi_error.log;
}
